<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Granada Production House — Coming Soon</title>
  <meta name="description" content="Granada Production House — Coming Soon">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      height: 100%;
    }

    body {
      font-family: "Cormorant Garamond", Georgia, serif;
      color: #fff;
      overflow: hidden;
    }

    .hero {
      position: relative;
      width: 100%;
      height: 100vh;
      min-height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #1a1410;
    }

    .hero__image {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center 30%;
    }

    .hero__overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(
        to bottom,
        rgba(10, 8, 6, 0.35) 0%,
        rgba(10, 8, 6, 0.15) 40%,
        rgba(10, 8, 6, 0.45) 100%
      );
    }

    .hero__content {
      position: relative;
      z-index: 1;
      text-align: center;
      padding: 2rem;
    }

    .hero__title {
      font-size: clamp(2.5rem, 8vw, 5rem);
      font-weight: 400;
      letter-spacing: 0.35em;
      text-transform: uppercase;
      text-shadow: 0 2px 24px rgba(0, 0, 0, 0.5);
    }
  </style>
</head>
<body>
  <main class="hero">
    <img
      class="hero__image"
      src="assets/gph-homepage.png"
      alt="Granada Production House"
      width="1920"
      height="1080"
    >
    <div class="hero__overlay" aria-hidden="true"></div>
    <div class="hero__content">
      <h1 class="hero__title">Coming Soon</h1>
    </div>
  </main>
</body>
</html>
