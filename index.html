<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Granada Production House — Coming Soon</title>
  <meta name="description" content="Granada Production House — Coming Soon">
  <link rel="icon" href="assets/GPH-Logo-Wht - Fav.png?v=2" type="image/png">
  <link rel="apple-touch-icon" href="assets/GPH-Logo-Wht - Fav.png?v=2">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      height: 100%;
    }

    body {
      font-family: "Roboto", sans-serif;
      font-weight: 300;
      color: #fff;
      overflow: hidden;
    }

    .hero {
      position: relative;
      width: 100%;
      height: 100vh;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      padding-top: clamp(1.5rem, 12vh, 5rem);
      background: #1a1410;
    }

    .hero__image {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center 30%;
    }

    .hero__overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(
        to bottom,
        rgba(10, 8, 6, 0.35) 0%,
        rgba(10, 8, 6, 0.15) 40%,
        rgba(10, 8, 6, 0.45) 100%
      );
    }

    .hero__content {
      position: relative;
      z-index: 1;
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      padding: 0 2rem;
    }

    .hero__logo {
      display: block;
      width: min(90vw, 720px);
      margin-bottom: 2rem;
    }

    .hero__logo img {
      display: block;
      width: 100%;
      height: auto;
      filter: drop-shadow(0 2px 24px rgba(0, 0, 0, 0.5));
    }

    .hero__title {
      font-size: clamp(1.5rem, 4vw, 2.25rem);
      font-weight: 300;
      letter-spacing: 0.4em;
      text-transform: uppercase;
      text-shadow: 0 2px 24px rgba(0, 0, 0, 0.5);
    }

    @media (max-width: 767px) {
      .hero__logo {
        width: min(85vw, 320px);
        margin-bottom: 1.5rem;
      }

      .hero__title {
        letter-spacing: 0.3em;
      }
    }
  </style>
</head>
<body>
  <main class="hero">
    <img
      class="hero__image"
      src="assets/gph-homepage.png"
      alt="Granada Production House"
      width="1920"
      height="1080"
    >
    <div class="hero__overlay" aria-hidden="true"></div>
    <div class="hero__content">
      <picture class="hero__logo">
        <source media="(max-width: 767px)" srcset="assets/GPH-Logo-Wht - Mbl.png?v=2">
        <source media="(min-width: 768px)" srcset="assets/GPH-Logo-Wht.png?v=2">
        <img
          src="assets/GPH-Logo-Wht.png?v=2"
          alt="Granada Production House"
          width="720"
          height="120"
        >
      </picture>
      <p class="hero__title">Coming Soon</p>
    </div>
  </main>
</body>
</html>
